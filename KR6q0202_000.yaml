front:
  text: 古瓶山牧道者小影自題只這觜臉迥沒回互上無攀仰一無所慕下絶己躬一無所妒道僧不僧道俗不俗有時孤峰頂上獨宿有時十字街頭接人有時遊戲金馬門有時蹴踏青獅窟深深處佛聖難窺密密處魔外罔測話未問時當頭截腳未跨時劈面喝豎起吹毛凜凜貴圖眼中出屑疑似善慧甘贄之體裁卻如布袋普化之作用傳不傳之心印振丕振之綱宗經行坐臥道合其中波澄月現風虎雲龍咄古瓶山牧道者究心録序當夫十方虛空悉皆消隕之時誰能發真歸元通體徹悟倒用魔王印追大軍於藕絲孔中全提金翅威取毒龍於生死海底者乎若夫牧道者之遇介和尚也啐啄同時當陽囑付如鴻毛御順風如巨魚縱大壑自車溪一枝佛法為檇李五葉嫡傳者從此須臾咨決併擔齊挑矣牧道者之頌古詩偈橫説豎説也拈提祖案拂拭宗風如枯樹垂滋葳蕤妙葉如寒禽扇旭下上瓊音衝口信筆總在無可思議中謂之不曾道著一字一句可矣牧道者之轉一筋斗換一頭面也初當紱冕侍衛現生華胄簪纓既當陵谷滄桑應化黃堂綰綬究竟就威音王那畔聳身進十八變竿頭良由向上一著心到無心究到無究安到無安話到無話彌天識網不遮智慧燈匝地情濤不汩性命蒂仍還牧道者本來面目脫然三界外縱橫手眼於世出世間是所贊歎也康熙壬寅仲夏望日國子司業曹溪憨祖弟子福徵談貞默槃談撰牧道者究心録序古瓶山牧道者究心録目次像贊傳序示衆機緣拈古頌古源流頌偈頌書問雜著自題只這觜臉迥沒回互上無攀仰一無所慕下絶己躬一無所妒道僧不僧道俗不俗有時孤峰頂上獨宿有時十字街頭接人有時遊戲金馬門有時蹴踏青獅窟深深處佛聖難窺密密處魔外罔測話未問時當頭截腳未誇時劈面喝豎起吹毛凜凜貴圖眼中出屑疑似善慧甘贄之體裁卻如布袋普化之作用傳不傳之心印振丕振之綱宗經行坐臥道合其中波澄月現風虎雲龍咄附松石圖卷像贊牧雲門和尚贊折蘆庵裏曾相見此日卷中重對面分明只是項牧公胡然頂相看來變臨風捉塵愛談玄宦海生涯渾不羡牧得牛來性已馴悠然水草溪山遍交遊半在青雲端憶同拜手黃金殿桃花流水自年年春風捲幕飛雙燕子規聲中呼客歸殷勤又聽黃鸝囀瓶山堂上坐題詩身世冷觀真露電梧山牧老人草覺浪盛和尚贊飛蚊上鐵牛拍手笑無休一卷伏羲未畫一琴黃帝未調二豎天聾地啞贏得松石為儔杖人不合點破太泄牧公風流戊戌佛降誕日皋亭浪杖人盛題本師和尚贊裴休請黃蘗安名長髭求南嶽點眼今日牧公乞金明題像者三箇漢不論是緇是素好與三十拄杖何故𠰚松下石邊橋流水響己亥冬季蠡湖進老僧手書一初元和尚贊德超勳貴行壓張王手拈麈拂力挽頽綱傳臨濟正宗兮明同杲日賡蠡湖曲調兮聲徹諸方牧法姪勿囊藏搭起袈裟鐵脊梁從教嫩桂永昌昌癸卯夏日永正元道人題此牧公親翁乃項襄毅公冢孫為大金吾蘭齋公哲嗣值滄桑而攖奇難去世爵而守清漳全活輯寧奏最解綬釋瑞鵲之宦署返端本之賜廳夙契宗乘徹圓智證得天界金明之入室衣拂淵源合儒禪祖印之嫡傳箕裘超邁説偈迭揚於緇素賡歌蚤溢於甘棠揮麈科頭處翛翛松菊林勳銘丁令鶴禪契子牙琴風月傳衣偈雲霞説項吟縹緗貽玉樹身世越當今東皋談貞默此老面似生鐵之堅硬心如皓月之圓明兀坐於片石巖傍而樂四時景況放懷於長松樹下而觀萬物性情噫無形之形兮本不可形無名之名兮本不可名愚又豈肯矢上加尖而點污吾兄清白之家聲匡山五乳同門弟笑雲旭謝塵容而處巖谷逍遙乎方袍頭禿若非道氣與高懷曷為乎三徑清風肅肅硯民褚廷琯題淵明境界摩詰胸中逃儒歸釋信解無窮法眼視之知是肉身羅漢眷屬相看還喚牧公牧公一味道人同門真覺贊治中別駕淹其才白石清泉寫其趣遊神乎天而天為之縱馳譽乎世而世為之遇目炯炯若巖下電胸英英若澤中澍襄毅履傳君能右步公保符懸君能左顧嘯傲金紫間蕭散瞿曇附拈花喻風幡之義夢槐醒冰輪之路棒喝嘻嘻絲綸注注咦斯牧翁者乃竺乾之彌雲閥閲之時雨出則為巨鼎以調羹止則馭三車而飲乳世通家小弟駱雲程題羡君不與世同流一種清姿品自修卸脫簪纓償夙志提持麈拂豎弘猷寰中未願酬人識物外寧甘任獨幽矯矯生平誰得似尋來知己許相投同門法弟真鑒贊大哉居士閲世出世機眼盡空反為聲勢高坐長松不談真諦目曠神怡追風良驥新安同門弟真璨贊有大居士曰維牧翁現宰官身示比丘容七橫八豎遊戲虛空裴公德望龐老高風各各長篇短什雖極力贊歎而又何足以盡公通家教弟施博拜題怡神天際外所向不遺蹤金明親指顧動靜悉從容龍淵同門弟圓法題千載高名羡釣臺拂衣中歲賦歸來溪邊早證文忠偈堂上曾聞清獻雷白麈橫拈風卓朔烏藤倒卓座崔嵬每懷法道今寥落全賴渠儂力挽回同門法弟真炯贊個漢經文緯武鐵骨稜稜謂是宮保襄毅公七世孫嗣爵執金吾臨政治民底賢宰官卻被他換卻眼睛謂是傳臨濟正宗三十二世嗣法金明底大居士亦被他換卻眼睛即謂世出世間摸他不著佛祖位中籠他不住茶煙鶴舞漏泄家風水峙橋流知音有幾總被他換卻眼睛畢竟如何請向丹青繪不到處諸大善知識及學士先生贊歎不及處更須著眼咄又是一層法弟羅開驎拜題我夫子曰繪事後素且道未繪以前如何名目任爾僧繇也難描摹雖然如是不妨向筆尖頭上示宰官身現比丘相如月臨水隨緣應赴即今展卷覿面握麈尾而燕坐者又是阿誰咄元來是吾檇李法兄項公老牧峽汜法弟田徹拜題百年無為維君子恥百年有為道所戒止猗歟牧公有無為濟克紹厥家陸沉斯世曰仕曰隱綽有餘裕而貌屼然足以勝其所負而懷超然斯以表其所悟望如木雞龍象攸踞松石之間與我稅處翠竹黃花真照殊契是誠得乎精進之功匪徒有於遊揚之譽豫試品之以為托蓮社之劉遺民沉三航之龐安常也耶雁湖弟蔣之翹拜題巍然上品暫佐黃堂望隆丹嶼澤被清漳公餘適性山水為盟觀松示操玩石比貞攜琴與鶴舒卷雲煙快哉牧翁翩翩若仙功成名立歸而盤桓羲皇身際永矢弗諼古勾寅弟王顯謨漳州二府意欲買山隱徵圖帝眷賒庭間驅五馬麈拂演三車駕鶴凌霜月攀虯踞晚霞任他逢處説談笑醉黃花辛卯春古揚寅弟石瑋題漳州司理坐覽丹霞勝清光入畫圖風流真別駕解脫類維摩官舍芝田鶴家山果下駒未須梅尉逸卷幔即蓬壺華亭社弟周茂源齎詔漳州怡神者壽食氣者仙維余叔氏湛止秋淵宦成漳海拂袖歸田五湖彭澤心寄霞巔聿光大吾前人之家乘振後起者之數十傳侄景襄拜贊新增像讚木陳忞和尚贊佛真法身猶若虛空墻壁匪礙廓落匪通五采莫繪萬象普融無間緇素盡具此宗歸根得旨名異實同嗟哉龐老孰躡芳蹤見賢思齊今茲牧公時庚戌暮春之吉平陽弘覺忞老人題於江都東隱丈室玉林琇和尚贊名臣之後以躬行聞於鄉復回向空門珍重法道此世間全德人也王臣之囑受記靈山久矣天目頭陀題聞昔少年時便訪諸禪老久信人生浮去官寧不早所厭非榮華所戀非枯稿為盡平生懷心空事參討投機悟既深無情説偏好相證在逢人住山寧草草山中歲月長雲石盈幽抱間坐果何為誰將是非考同里弟王庭題豈必林泉癖公餘自委蛇松濤喧茗具琴語隔溪花揮麈標群鹿科頭罷晚衙石床饒異卉鶴舞拂雲斜西陵社弟戴京曾以世間法為襄毅公象賢之昆以出世間法為斷橋倫滅法眼之孫錦繡場中掉臂而過阿梨樹下踞坐稱尊笑他護雪鵝兒成底事會看擘海取龍吞鹽官法弟行純范驤拜題僧非僧兮俗非俗三眼摩醯看不足風雷為舌語驚時雪玉在躬清可掬有時分虎符鯨海波平有時拈麈尾天魔膽肅法道垂秋袒肩續夫是之謂次庵長老瓶山老牧法弟弘散拜題金粟如來居士身和光混俗繼燃燈青獅忽現宰官相四海依然長老稱胸襟流出蓋乾坤馬駒腳下遍兒孫但於善財巡禮偈當年豈例是沙門後學道泰拜題老漢生平作略太煞過人一頭遠繼瓶山七世之芳躅巍巍乎朝野傳宣德政近紹蠡湖萬頃之洪波洋洋乎一肩橫荷宗猷栗棘金圈拋來擲去白笏紫綬全放全收更要人識伊面目倚松坐石突出雙眸今日撞著不肖兒孫一時泄漏蓋代之風流嗣法門人機峻百拜敬題古瓶山牧道者傳鹽官同學道弟何園客著牧道者名謙字牧公嘉興府秀水人也先本姬姓堯之第六子封於項子孫以國為氏世居遼西漢時名萬金者為司徒遷洛陽進賢鄉垂稱項家巷後名晉者仕宋為大理評事當高宗南渡扈蹕僑居嘉禾之胥山孫名宏度號胥山居士墓在山麓有八一公碑是為嘉禾始祖孫名忠歷秩宮保諡襄毅勳著史册牧道者七世祖也父俊卿大金吾左都督賜一品蟒服母沈氏誥封夫人公生於神宗丁巳臘月草一日午時在妊母夢星殞懷及産腰有紫黑子七如北斗襁褓中見僧合掌微笑坐必跏趺童時淳實端恪不妄言笑遂通書史年十八居燕京專持準提神咒禮崇國寺洪慈法師覽心經及華嚴合論歎曰灼然在聖不增處凡不減輒了大意信知成佛真實不虛志慕空宗首謁博山余集生諸老命參生從何來死從何去話是時集生與公伯兄震緣事逮問在部每對榻橫塵公必侍立余撫公背謂震曰骨相志氣君家汗血駒也他日佩毗盧印據選佛場者非此子乎公再拜而退喜以自負從此孜孜兀兀以向上一著參究二十餘年礙膺不釋庚辰歲遵奉父命承廕金吾寅畏小心冤濫靡不昭雪未幾世亂甲申人日公夢山石崩飛潛身無地聞空中語曰但持吾咒爾難可免闖賊陷京公率家丁巷戰銛矛刺胸衣不受損徒步奔南屢遇暴不能害後張公完真陳公天章相繼總制浙閩公賴佛祖能仁啓迪從幕下克全萬萬生命兩公交章題授漳州別駕託以撫循公以慈力禁暴備荒申救冤抑保護甚衆蓋公為人襟懷空洞人莫測其涯涘望之有巖巖氣象靜也淵徹動也風行介然而不與易更確乎不可拔也豈非壁立萬仞令人見之意消而下視培塿丘垤似無足當其意者壬辰歲至福州見粵東華首空隱禪師師本分接人之暇亦贊念佛持咒蒙授準提懺像歸送楞嚴重梓流通一日禮懺口宣佛身充滿於法界普現一切群生前忽然身心脫落遂述偈曰一手拈磬一手鼓今日捉敗無位祖觸處逢渠本現成恆河沙國佛一母後參天界浪和尚浪曰聞你幼年見博山余集生諸公是否公禮曰今日特特禮拜和尚浪曰除卻搖唇鼓舌豎指揚眉處還我到家語來公又手默然浪頷之己亥春參金明介庵本師問涅槃心易曉差別智難明如何是差別智庵云差別且止喚甚是涅槃心公舉拳庵云死了燒了在甚麼處公才開口庵震威便喝公從此冰釋又作十二時偈呈庵庵接過曰這個是紙墨還別有麼公展手視庵庵乃休又一日庵拈香墜問曰無情如何説法公曰和尚拄杖子𨁝跳去也庵復勘問公拈墜擲地叉手而立庵拾墜置于几公曰無情説法竟庵休去一日庵刻蜜蜂頌將竣庵曰病朽觀你蜂頌頓恰意但要問你日出扶桑大地紅是何意旨下一轉語可付諸梨棗公云適問箇是什麼庵哂之公即呈偈曰聊聞舉著便承當好肉無端已剜瘡著眼機先看端的頂門誰不帶扶桑庵印可之即出源流衣拂囑曰從上佛佛祖祖以自己所證遞相承襲今以授汝宜體佛祖之心為心以續慧命付以偈曰師子窟中事善哮吼者得今得本無得無得得亦得名曰真本別號次庵時年四十三矣嗣法為臨濟三十二世公嘗示門人曰法道不振由於趨競時緣扶豎宗風貴乎立志固守不圖人衆攢簇因緣輻輳為奇特當念念以法道為己任刻刻以後學失據為己憂古人單丁背米供衆五六人亦不廢晚參如應庵祖著草鞋住院懶殘和尚寒涕垂膺四祖道信汾州無業芙蓉道楷諸大老休心息念斷絶攀援賜紫及號力陳遜謝豈非孤潔榜樣名垂千古何曾熱鬧亦何常營心時緣之得失所患道德之不充莫患時緣不就慎之勉之公之法言作略概可見矣以致九州四海傳稱次庵長老云有法嗣三人一名機峻號坦庵前住普光禪院後住淨心院二名機旃號慈林三名機𠁼號獅王住妙喜山中
