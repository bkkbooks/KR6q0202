body:
  text: 嗣法門人機峻等編八月望小參毘耶不二門百川應倒流法界不容身千聖覷不破截斷意根已成階級塞卻咽喉轉見周遮明明麗天皓月印長空明明匝地清風有何極淨裸裸赤灑灑全承者箇神力不在別處流轉但凡夫信不及奚得自輕而退屈所以有情則動轉施為無情則森羅顯煥縱使去來不以象動靜不以形猶未究竟如今瓶山拄杖指魚化龍點鐵成金更若不會化作無邊身菩薩十方各趣悉皆普現去也還見麼眾兄弟見則且置正當恁麼時一句作麼生良久云八月秋何處熱拽杖下座示眾溈嶺牧牛玄沙見虎無物堪比倫象骨輥毬禾山打鼓兩手相分付行棒行喝揭示妙淨明心拽石搬土顯露摩醯首眼從無住本建一切法運無功用辦一切事隨所作心應所知量透過關者掉臂而行未透關者葛藤窠裏埋沒且道不涉形名一句如何通信一塵纔舉起全體現優曇卓杖下座示眾舉黃龍心禪師因黃山谷乞指徑截處龍曰秖如仲尼道二三子以我為隱乎吾無隱乎爾太史居常如何理論公擬對龍曰不是不是公迷悶不已一日侍龍山行時巖桂盛放龍曰聞木樨花香麼公曰聞龍曰吾無隱乎爾公釋然師曰黃龍與麼道秖解旁通話跡繞路指蹤猶未直捷瓶山今日掃除文字迥脫根塵為諸兄弟拈出具眼者辨取以拄杖卓一下曰還見麼白鷺下田千點雪黃鸝上樹一枝花示眾我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵眾兄弟一眼觀天兩腳踏地且道明珠在甚麼處良久云春在艸頭上王孫幾箇知示眾拈起拂子云者裏薦得猶是法身邊事直饒皓月行空湧沒自在也未夢見法身向上事須知有冰楞上走馬劍刃上翻身若識此人行腳事畢誕日示眾有物無形先天地生能為萬象主不逐四時凋諸兄弟什麼物恁麼奇特舉拂子云露付坦菴峻上座衣拂小參雞足峰前披坐大庾嶺上持來瓶山今日拈出事不獲己弗免從頭註破瓶山昔年初參博山得其毛次於海內參見三十餘員尊宿得其皮骨末後在金明上介下菴本師和尚處得其髓方敢承受此衣不欲囊藏和盤托出但此衣固非形相之可拘亦非情識所能測非獨伶俐仙陀看即有分便是諸佛出來也不敢正眼覷著今日撞著牙如劍樹口似血盆箇無面目漢汝在諸方參得的與我拋卻舉拂云向這裏道將一句來峻禮拜云金香爐下鐵崑崙師打一拂子云更須珍重遂付衣拂源流師復囑云試看黃梅七百僧信衣三鼓付盧能心心相印何緇素秖貴當人正眼明喝一喝下座示眾炎炎得意事一過輒生涼清真寂寞心愈久偏生味只貴見地穩實等閑豈曰平常遂舉扇曰若喚作扇子入地獄如箭射參示眾端本堂與諸人說法了也闊子松風濤滾滾與諸人說法了也柏樹子磊磊落落與諸人說法了也還委悉麼如其未委拈拄杖擲下曰向者裏薦取示眾舉南陽忠國師僧問如何是本身盧舍那國師云與我過淨瓶來僧將淨瓶到國師云卻安舊處著僧復問如何是本身盧舍那國師云古佛過去久矣師曰日上曉山黛青處處逢渠鳥音碎花影濃頭頭撞著凍河發燄何妨寒灰死火枯樹敷花豈論春前冬後南陽羅龍陷虎慣得其便這僧作家好與擊破淨瓶使國師懡㦬有分然據正眼看來國師只知量邊事不識這僧問頭遂起身立云國師在這裏本身在甚麼處大眾道道看示眾有相身中無相身情與無情共一真霜月凌空咸聖智何山松檜不青青久立珍重示眾未離兜率且喜一半已降王宮觸途成滯夜睹明星脫賺平人為母說法猶涉唇吻靈山拈花未免色塵迦葉破顏全呈管見瓶山與麼道還有與世尊出氣者麼遂喝一喝云出群須是英靈漢敵勝還他獅子兒便下座因事小參驀劄相逢無非正體擒縱卷舒不從他得到這裏獨步丹霄清風明月不妨打開庫藏運出自己家珍與佛與祖同德同仁竺乾維摩震旦華閑同拈同放乃至與龐蘊張無盡楊大年何密庵之輩同一機用同一境照更有何事其或知見不清行履不正未免被物所役直須一一透徹本有風光不墮凡聖緇素之所滯礙不隨聲色語默之所流轉淨裸裸赤灑灑全體與麼來全體與麼去豈不慶快也哉眾兄弟還委悉麼相逢盡道休官好林下何曾見一人示眾舉臨濟大師云一喝分賓主照用一時行師拍膝一下云且道是賓耶主耶照耶用耶還會麼域中無向背閫外有威權示眾云彩雲時復白錦樹曉還青浩歌聲自寂乾坤一草亭舉拂子云惟有這箇不屬諸數還有識得渠者麼師良久云你諸人在這裏覓甚麼碗便趁出示眾舉溈山示眾云老僧百年後向山下作一頭水牯牛左脅下書五字曰溈山僧某甲當恁麼時喚作溈山僧又是水牯牛喚作水牯牛又是溈山僧畢竟喚作什麼即得仰山禮拜而退師曰溈山何異蝦為子曲仰山大似證龜作鱉各領三十棒若問瓶山畢竟喚作什麼劈手披胸云吽吽且道與古人是同是別示眾舉止承渠力從緣尋舊蹊方春荷鈍钁日暮還灌畦箇中無限意端的有誰知時有僧出問云應如是住如是降伏其心其心降伏不住時如何師厲聲云是誰降伏示眾瓶山有一則現成公案供養大眾只是領會者少錯會者多便下座示眾拈起拄杖云若不患盲一切俱見卓杖一下云若不患聾一切皆聞若果聞果見世出世間打成一片正偏回互賓主歷然坐斷一切差別初無動搖如大日輪舉無遺照縱使德山臨濟到來也須退身有分眾兄弟還會麼不是男兒多意氣只因曾踏上頭關喝一喝下座示眾缽盂拄杖轉大法輪露柱燈籠立地聽且道露柱燈籠聽箇什麼缽盂拄杖說甚麼法不可以缽盂拄杖昧卻露柱燈籠不可以露柱燈籠不明缽盂拄杖眾兄弟向這裏有箇會處露柱燈籠缽盂拄杖更無兩般脫或未然則佛句祖句賓主句翳然在目且道如何得洞徹玄旨聻本來成現事切忌亂承當示眾樹凋葉落體露金風如何說箇體露的道理拈起拄杖云青山高突兀白水響潺湲示眾欲知佛性義當觀時節因緣時節若至其理自彰即今是什麼時節秋色依依秋虫唧唧出門盡寒山對面無相識瓶山與麼道汝等作麼生喝一喝示眾舉金陵寶誌垂語云終日拈香擇火不知身是道場玄沙備別云終日拈香擇火不知真箇道場師云金陵已露葛藤玄沙重下註腳一對無孔鐵錘可中有箇恰好且道誰是恰好舉手擺云明破即不堪一日僧問圓頂方袍佛之所制聞居士戴髮而披衣傳法未審出自何典師曰汝何出言之厲得無輕詆先聖者歟余雖識淺無辨請以盧行者事可憑之悉載傳燈所述唐咸亨二年五祖開法黃梅有居士姓盧名惠能參謁五祖問曰汝自何來盧曰嶺南祖曰欲須何事盧曰惟求作佛祖曰嶺南人無佛性若為得佛盧曰人有南北佛性豈然遂令服勞杵臼之間後五祖告眾述偈機語冥符則衣法皆付時會下七百餘僧惟盧得旨三鼓祖告曰諸佛出世隨機大小而引導之遂有十地三乘頓漸等旨以為教門然以無上微玅秘密圓明真實正法眼藏付於大迦葉展轉傳授二十八世至達磨屆於此土得可大師承襲以至于今吾今悉付於汝汝可流布無令斷絕盧行者跪受衣法啟曰法則既受衣付何人祖曰昔達磨初至人未之信故傳衣以明法衣乃爭端止於汝身所謂受衣之人命如懸絲也且當遠隱俟時行化至儀鳳元年丙子正月八日盧寓法性寺風颺剎幡聞二僧對論盧以風幡非動動自心之句印宗法師竊聆邀徵風幡之義印宗執弟子禮乃告四眾曰今遇肉身菩薩指座下盧居士曰即此是也因請出所傳信衣悉令瞻禮至正月十五日會諸名德為之剃髮然付衣法在先圓頂在後若果有緇素分別則不應五祖付盧居士衣缽之典制并囑汝可流布無令斷絕之諄諄也明矣達磨四世孫華閑居士付法於曇邃禪師若干世又何密庵田素庵居士迺白雲度之子孫付法於和庵忠禪師若干世即西京尼道深乃芙蓉楷之嗣付法于奉聖才禪師若干世此出於少林佛祖世圖碑記班班可稽付衣表信傳法印心實無緇素相貌而繼紹也又明矣又不見世尊佛法付托國王大臣居士此非古今在家出家同得正法眼藏之標榜未常獨限於圓頂方袍也昔常不輕菩薩見人便禮拜曰吾不敢輕於汝等汝等皆當作佛況自唐迄今天下大宗匠咸出於盧行者之苗裔汝何詆厲如此更一人有名呼不得無位可安排若不識此人幸勿以居士而忽諸僧慚禮退機緣問如何是藏身處沒蹤跡師云日落花無影如何是沒蹤跡處莫藏身師云風高樹有聲一日途中遇又寒兄敘寒溫畢又寒問如何是臨行一句師拱手曰請了相笑而別問法身是有相無相師喝曰是有是無問不離當處常湛然如何師云臥龍最怖碧潭清問如何是涅槃門師曰此去福城五里一僧譚及法門中事師曰者箇什麼所在說長道短適值茶次僧指卓案上大小鐘碗曰大小不齊是如何師曰一窯燒出相笑便行問如何是本來身師曰風吹日炙問如何是佛法的的大意師曰春來草自青月上已天明福嚴費和尚在嚴𨍏轢處應供如念兄邀往舟中參謁次如念曰此公在福建漳州府出仕費問曰幾年上師曰庚寅七年費曰曾殺人麼師曰曾殺費曰殺多少師曰一切總殺費曰忽遇同氣連枝交友投分者作麼生師曰揀擇甚麼費曰怎不自殺師曰直無下刃處費大笑師便禮退問如何是祖師西來意師指爐曰張銅爐似金曰此意如何師曰霜風寒徹骨問如何是道師曰步步踏著如何是道中人師曰鬧市裏輥一日坦菴重參機語相投師問及參詢行實次晨呈行由師閱畢復索云還有麼坦云甚處猶少師即棒云不得放過士問樹凋葉落體露金風意旨作麼生師曰遍界不曾藏曰畢竟如何值童子邀請師曰瓶山騎佛殿領供去也士禮拜問那吒太子析肉還母析骨還父乃現本身為父母說法如何是本身師曰西風吹落葉萬樹盡皆秋一日坦菴上座作相云中有一能殺能活能縱能奪未審是那一請大人點出專使呈上師便扯破即以原封示之空諸法兄拈云坦公慣捋虎鬚一場漏逗瓶山正令雖行未免憐兒不覺醜空諸又不然待云請大人點出但向道且喜吾徒頭角已露看他怎生合煞并啟云前在方丈中讀尊錄見坦公呈四圓相請大人點出忍俊不禁謹述拈語呈似伏候賜棒次庵法兄猊座師開緘覽畢喚侍者將燈來侍者將燈至師便連封燒卻問萬法歸一一歸何處師曰火裏鐵牛行曰意旨如何師曰臂長衫袖短問忽來忽去時如何師曰長江競渡舟曰不來不去時如何師曰奇怪石頭獰似虎火燒松樹舞如龍僧問洞山好佛秖是無光作麼生師微笑曰意旨如何師曰笑中有刀僧禮拜師曰有眼如盲
