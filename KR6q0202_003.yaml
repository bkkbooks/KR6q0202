body:
  text: 後學全相機峻全元等同録源流頌古初祖菩提達磨大師受西天二十七祖般若多羅囑讖於梁普通七年來震旦初至金陵與武帝機不契寓止嵩山少林面壁而坐人莫之測二祖慧可躬詣求法立雪斷臂向祖問諸佛法印可得聞乎祖曰諸佛法印匪從人得可曰我心未安乞師與安祖曰將心來與汝安可良久曰覓心了不可得祖曰與汝安心竟可悟入越九年祖命門人曰時將至矣汝等合言所得有道副對曰如我所見不執文字不離文字而為道用祖曰汝得吾皮尼總持曰我今所解如慶喜見阿閣佛國一見更不再見祖曰汝得吾肉道育曰四大本空五陰非有而我見處無一法可得祖曰汝得吾骨慧可出禮三拜依位而立祖曰汝得吾髓乃顧可曰昔如來以正法眼付迦葉尊者展轉囑纍而至於我我今付汝汝當護持并授袈裟以為法信付法偈曰吾本來茲土傳法救迷情一花開五葉結果自然成頌曰九年面壁草萋萋卻賺神光腰雪齊一自覓心剛得髓至今千古示全提二祖慧可大師從初祖得法博求法嗣時三祖為居士年踰四十不言名氏禮祖問曰弟子身纏風恙請和尚懺罪祖曰將罪來與汝懺士良久曰覓罪了不可得祖曰與汝懺罪竟宜依佛法僧住士曰今見和尚已知是僧未審何名佛法祖曰是心是佛是心是法法佛無二僧寶亦然士曰今日始知罪性不在內不在外不在中間如其心然佛法無二也祖深器之為之剃髮名曰僧璨付法偈曰本來緣有地因地種花生本來無有種花亦不會生覓罪空時萬仞摧通身風恙絶疑猜司空嶺上無形樹不待春光花自開三祖僧璨大師自二祖授法深自韜晦居無常處積十餘載人無知者四祖道信時為沙彌年始十四禮祖問曰願和尚慈悲乞與解脫法門祖曰誰縛汝曰無人縛祖曰何更求解脫乎信于言下大悟服勞九載付法偈曰花種雖因地從地種花生若無人下種花地盡無生分明縛脫絶安排誰識於中隱顯該言下掀翻無異路紫泥三詔破雲來四祖道信大師嗣法三祖住蘄春破頭山學侶雲臻一日往黃梅縣路逢一小兒骨相奇秀異乎常童祖問曰子何姓答曰姓即有不是常姓祖曰是何姓答曰是佛性祖曰汝無姓耶答曰性空故無祖默識是法器即遣侍者從其母乞出家後付法偈曰花種有生性因地花生生大緣與性合當生生不生驀地相逢借問由將南酬北播真猷大緣若謂呈奇特誤聽松風萬古秋五祖弘忍大師前身為破頭山中栽松道者轉遇四祖得法嗣化六祖時為居士姓盧名慧能聞讀金剛經有省自新州來參祖祖令隨衆作務祖一日令衆述偈意符則授衣法會下七百餘僧上座神秀於廊壁書偈曰身似菩提樹心如明鏡臺時時勤拂拭莫使惹塵埃祖見知秀所作乃讚嘆曰後人依此修行亦得勝果各令念誦盧在碓坊聞之至夜倩人於秀偈側亦書一偈曰菩提本無樹明鏡亦非臺本來無一物何處惹塵埃祖見曰此是誰作亦未見性衆聞祖語遂不之顧逮夜祖潛詣碓坊問曰米白也未盧曰白也未有篩祖以杖擊碓三下而去盧即三鼓入室祖密付衣法囑善保護無令斷絶付法偈曰有情來下種因地果還生無情既無種無性亦無生應無所住已生心脫體無依解轉身米白篩來三鼓後別開要徑一肩新六祖慧能大師黃梅得法後住曹溪南嶽讓祖來參祖問甚麼處來讓曰嵩山來祖曰什麼物恁麼來讓無語經八載忽然有省乃白祖曰某甲有箇會處祖曰作麼生師曰說似一物即不中祖曰還假修證否讓曰修證則不無染污即不得祖曰祗此不污染諸佛之所護念汝既如是吾亦如是祖為說法偈曰心地含諸種普雨悉皆生頓悟花情已菩提果自成什麼物兮恁麼來龍吟枯木起轟雷八年舉似無倫比染淨俱忘入禍胎曹溪第二世南嶽懷讓禪師見馬祖常習坐禪師問曰大德坐禪圖甚麼祖曰圖作佛師乃取一磚於彼菴前石上磨祖曰磨作甚麼師曰磨作鏡祖曰磨磚豈得成鏡耶師曰磨磚既不成鏡坐禪豈得作佛祖曰如何即是師曰如牛駕車車若不行打車即是打牛即是祖無對師又曰汝學坐禪為學坐佛若學坐禪禪非坐臥若學坐佛佛非定相于無住法不應取捨汝若坐佛即是殺佛若執坐相非達其理祖聞示誨如飲醍醐禮拜問曰如何用心即合無相三昧師曰汝學心地法門如下種子我說法要譬彼天澤汝緣合故當見其道又問道非色相云何能見師曰心地法眼能見乎道無相三昧亦復然矣祖曰有成壞否師曰若以成壞聚散而見道者非見道也乃說偈曰心地含諸種遇澤悉皆萌三昧花無相何壞復何成祖遂開悟心意超然侍奉九秋日益玄奧坐禪屈佛磚成鏡說甚打牛又打車幸遇甘霖緣會得不知依舊亂如麻曹溪第三世江西馬祖道一禪師百丈為侍者一日侍祖行次見一群野鴨飛過祖曰是甚麼丈曰野鴨子祖曰甚處去也丈曰飛過去也祖遂把丈鼻扭負痛失聲祖曰又道飛過去也丈於言下有省又後侍立次祖目視繩床角拂子丈曰即此用離此用祖曰汝向後開兩片皮將何為人丈取拂子豎起祖日即此用離此用丈挂拂子於舊處祖振威一喝丈直得三日耳聾祖付法偈曰心外本無法有付非心法既知非法心如是付心法啐啄之機臭味同鼻頭扭破髑髏空雷轟地震重提掇直至而今耳盡聾曹溪第四世洪州百丈山懷海禪師一日謂衆曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾時黃檗聞舉不覺吐舌師曰子已後莫承嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機大用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見檗便禮拜師付法偈曰本無言語囑強以心法傳汝既受持去心法更何言偶爾垂慈舉示伊知音暗裏展鎗旗舌頭墮地云何會見過於師更不疑曹溪第五世洪州黃檗山希運禪師臨濟在師會下行業純一首座睦州嘆曰雖是後生與衆有異遂問上座在此多少時濟云三年座曰曾參問也無濟云不曾參問不知問箇什麼座云汝何不去問堂頭和尚如何是佛法的的大意濟便問聲未絶師便打濟下來座云問話作麼生濟云某甲問聲未絶和尚便打某甲不會座云但更去問濟又問師又打濟如是三度問師三度打濟白首座云幸蒙慈悲令某甲問訊和尚三度發問三度被打自恨障緣不領深旨今且辭去座云汝若去時須辭和尚去濟禮拜退座先到師白云問話底後生甚是如法若來辭時方便接他向後成一株大樹與天下人作蔭涼去在濟辭師師囑云不得往別處去汝向高安灘頭大愚處去必為汝說濟到大愚愚問甚處來濟云黃檗來愚曰黃檗有何言句濟云某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗與麼老婆心切為汝得徹困更來者裏問有過無過濟於言下大悟云元來黃檗佛法無多子愚搊住曰者尿床鬼子適來道有過無過如今卻道黃檗佛法無多子你見箇甚麼道理速道速道濟遂築犬愚脅下三拳愚拓開曰汝師黃檗非干我事濟便回師見便問者漢來來去去有甚了期濟云祗為老婆心切人事了侍立師又問什麼處去來濟云昨奉慈旨令參大愚去來師云大愚有何言句濟遂舉前話師云作麼生得者漢來待痛與一頓濟云說甚麼待來即今便喫隨後便掌師云者風顛漢卻來者裏捋虎鬚濟便喝師云侍者引者風顛漢參堂去後付偈曰病時心法在不病心法無吾所付心法不在心法途三頓烏藤眼搭眵高安一撥利如錐築拳脅下方伸信倒跨崑崙鐵馬嘶曹溪第六世鎮州臨濟義玄禪師興化為侍者機緣默契師以法偈印之偈曰至道無揀擇本心無向背便如此承當春風增瞌睡化後充三聖首座次任大覺院主云云開堂日此一炷香本為三聖師兄三聖於我太孤本為大覺師兄大覺於我太賒不如供養臨濟先師當家才識柴米價養子方知父母恩至道無難嫌揀擇孤賒迥出定乾坤臨濟第二世魏府興化存獎禪師南院久依座下師以法偈付曰大道全自心亦非在心求付汝自心道無喜亦無憂老屋離披意自寒不堪憂處事無瞞此心付汝何憂喜無限風光孰與看臨濟第三世汝州南院慧顒禪師風穴在會作園頭師一日入園問云南方一棒作麼生商量穴云作奇特商量穴卻問和尚此間一棒作麼商量師拈棒云棒下無生忍臨機不見師穴於言下大徹依止六年師付法偈曰我今無法說所說皆非法今付無法法不可住於法棒下無生徹骨親顒翁語魯指西秦知音不在千杯酒一盞清茶也醉人臨濟第四世汝州風穴延沼禪師首山充知客時常密誦法華一日侍立次師乃垂涕告曰不幸臨濟之道至吾將墜於地山曰觀此一衆豈無人耶師曰聰明者多見性者少山曰如某者如何師曰吾雖望子之久猶恐耽著此經不能放下山曰此亦可事願聞其要師於是上堂舉世尊以青蓮目顧視大衆迦葉正當與麼時且道說箇什麼若道不說而說又是埋沒先聖且道說箇什麼山拂袖而退師擲下拄杖歸方丈次日山與真園頭同上問訊師問真曰作麼生是世尊不說說真曰鵓鳩樹頭鳴師曰你作許多癡福作麼何不體究言句又問山曰你作麼生山曰動容揚古路不墮悄然機師謂真曰你何不看念法華下語付首山偈曰無說是真法其說原無說我今說付時說說何曾說室中憂墜涕心酸舉古明今露影竿不墮悄然揚古路冷光猶是逼人寒臨濟第五世汝州首山省念禪師一日上堂汾陽出問百丈捲席意旨如何師曰龍袖拂開全體現陽云未審師意如何師云象王行處絶狐蹤陽於言下大悟遂提起坐具顧視大衆云萬古碧潭空界月再三撈漉始應知禮拜歸衆時葉縣省和尚作首座才退便問昭兄你適來見箇什麼道理便與麼道陽云正是我放身捨命處省便休師付汾陽法偈曰自古付無說我今亦無說只此無說心諸佛所共說問處分明答處親輕輕撥著便翻身投機一語驚人耳惹得傍觀努目新臨濟第六世汾州太子院善昭禪師慈明參師師揣其志經二年未許入室明每詣方丈師見必詬罵或毀詆諸方及有所訓皆流俗鄙事明一夕訴曰自至法席已再夏不蒙指示但增世俗塵勞念歲月飄忽己事未明有失出家之利語未卒師熟視罵曰是惡知識敢裨販我怒舉杖逐之明擬伸救師驀掩其口明忽大悟曰是知臨濟道出常情服役七年辭去付偈曰虛空無形象形象非虛空我所付心法空空空不空格外全提迥不同粗言辣語播宗風淆訛掣斷知端的掩口分明見熱衷臨濟第七世潭州石霜慈明楚圓禪師自南源徒道吾石霜皆楊岐總院事岐依師雖久未有省發每咨參師曰庫司事繁且去他日又問師曰監寺異日兒孫遍天下在何用忙為一日師適出雨忽作岐偵師小徑既見遂搊住曰者老漢今日須與我說不說打你去師曰監寺知者般事便休語未卒岐大悟即拜於泥塗問曰狹路相逢時如何師曰你且躲避我要去那裡去岐歸來日具威儀詣方丈禮謝師呵曰未在一日師上堂岐出問幽鳥語喃喃辭雲入亂峰時如何師曰我行荒草裡汝又入深村岐曰官不容針更借一問師便喝岐曰好喝師又喝岐亦喝師連喝兩喝岐禮拜師曰此事是箇人方能擔荷岐拂袖便行師付法偈曰虛空無面目心相亦如然即此虛空心可稱天中天卒風暴雨偵師蹤饒舌泥途亦不中縱奪之機猶未已紅爐點雪孰堪容臨濟第八世袁州楊岐方會禪師白雲端參師一日忽問上人落髮師為誰端曰茶陵郁和尚師曰吾聞伊過橋遭攧有省作偈甚奇能記否端即誦曰我有明珠一顆久被塵勞關鎖今朝塵盡光生照破山河萬朵師笑而趨起端愕然通夕不寐黎明咨詢師適歲莫師曰汝見昨日打驅儺者麼曰見師曰汝一籌不及渠端復愕曰意旨如何師曰渠愛人笑汝怕人笑端因大悟於言下師付法偈曰心體如虛空法亦遍虛空證得心空理非法非心空興奪雙行驗作家更添一笑撒泥沙黎明捉敗渠儂處自不重栽眼裡花臨濟第九世舒州白雲守端禪師浮山遠聞師頌臨濟三頓棒有過人處指五祖演見師祖請益南泉摩尼珠話師叱之祖領悟獻投機偈曰山前一片閒田地又手叮嚀問祖翁幾度賣來還自買為憐松竹引清風師印可令掌磨事一日師謂祖曰有數禪客自廬山來皆有悟入處教伊說亦說得有來由舉因緣問伊亦明得教伊下語亦下得秪是未在祖於是大疑私自計曰既悟了說亦說得明亦明得如何卻未在遂參究纍日忽然省悟從前寶惜一時放下走見師師為手舞足蹈祖亦一笑而已祖後曰吾因茲出一身白汗便明得下載清風師付法偈曰道我元無我道心元無心惟此無我法相契無我心萬機把斷指衷由打草驚蛇展一籌白汗淋漓明下載從前寶惜一時休臨濟第十世蘄州五祖法演禪師圓悟出蜀遍參諸宿最後見祖盡其機用祖皆不諾乃謂祖強移換人出不遜語忿然而去祖曰待你著一頓熱病打時方思量我在悟到金山染傷寒困極以平日見處試之無得力者追繹祖言乃自誓曰我病稍間即歸五祖病痊尋歸祖一見而喜令即參堂充侍者方半月會部使者解印還蜀詣祖問道祖曰提刑少年曾讀小豔詩否有兩句頗相近頻呼小玉元無事秪要檀郎認得聲提刑應諾諾祖曰且仔細悟適歸侍立次問曰聞和尚舉小豔詩提刑會否祖曰他秪認得聲悟曰秪要檀那認得聲他既認得聲為甚麼卻不是祖曰如何是祖師西來意庭前柏樹子聻悟忽有省遽出見雞飛上闌干鼓翅而鳴自謂曰此豈不是聲遂袖香入室通所得呈偈曰金鴨香銷錦繡幃笙歌叢裡醉扶歸少年一段風流事秪許佳人獨自知祖曰佛祖大事非小根劣器所能造詣吾助汝喜後悟興佛眼佛鑑侍祖於一亭上夜話及歸燈已滅祖於暗中曰各人下一轉語佛鑑曰彩鳳舞丹霄佛眼曰鐵蛇橫古路悟曰看腳下祖曰滅吾宗者乃克勤耳祖付法偈曰真我本無心真心亦無我契此真真心我我何曾我聞聲見色非聞見一段風流顯見聞詣實供通句味別暗中點首出重雲臨濟第十一世成都府昭覺寺佛果克勤圓悟禪師虎丘隆入室師問曰見見之時見非是見見猶離見見不能及遂舉手曰還見麼隆曰見師曰頭上安頭隆聞脫然契證師叱曰見箇甚麼隆曰竹密不妨流水過師肯之俾掌藏有問隆藏主柔易若此何能為哉師日瞌睡虎耳付偈曰得道心自在不得道憂惱付汝自心道無喜亦無惱見不及處不曾藏舉箇拳頭抱賊贓契見脫然如睡虎威獰何處不風光臨濟第十二世平江府虎丘紹隆禪師住宣州彰教時圓悟歸蜀指應菴華見師師移虎丘華侍行未半載頓明大事師付法偈曰天晴雲在天雨落溼在地祕密付汝心心法只者是華後住饒之報恩師忌辰拈香云平生沒興撞著者無意智老和尚做盡伎倆湊泊不得從此卸卻干戈隨分著衣喫飯二十年來坐曲彔木懸羊頭賣狗肉知他有甚憑據雖然一年一度燒香日千古令人恨轉深天晴雨溼獨超群恩大難酬恨轉深無限干戈都卸盡懸羊賣狗到如今臨濟第十三世明州天童山應庵曇華禪師密庵傑初參師於衢之明果師屢呵斥一日問傑如何是正法眼傑遽答曰破沙盆師頷之付偈曰佛用眼睹星我用耳聽聲我用與佛用我明汝亦明正法眼答破沙盆萬象森羅觸處清遍布風光盈耳目師資肝膽一時傾臨濟第十四世明州天童山密庵咸傑禪師住烏巨破庵先參師命典客一日師偶對僧舉不是風動不是幡動先聞豁然大悟次日師遇先衆寮前問你總不得作伎倆試露箇消息看先應聲曰方丈裡有客師呵呵大笑先侍師凡五載盡得旨要後辭歸蜀師以偈送之曰萬里南來川藞苴奔流度刃扣玄關頂門戳瞎金剛眼去住還同珠走盤付法偈曰佛與衆生見元本不隔線付法付自心非見非不見不是幡兮不是風當機捉敗賣柴翁相逢狹路通消息歷劫如何用得窮臨濟第十五世夔州府臥龍破庵祖先禪師住蘇之西華秀峰有僧入室師打逐至法堂時無準範解曰禪和家爭禪亦常事耳師曰豈不聞道我肚饑聞板聲要喫飯去聻準聞不覺汗流浹背師居靈隱準復從一日侍遊石筍庵庵有道者請益曰胡孫子捉不住乞師方便師曰用捉他作麼如風吹水自然成紋準在旁大徹付偈曰我若不見時汝應不見見見見非自心自心當顯現明珠出水璞已琢眉毛撮結眼八角徹得猢猻消息斷乾坤如漆活卓卓臨濟第十六世徑山無準師範禪師賜號佛鑑斷橋倫祖在會下準以狗子因何有業識令祖下語凡三十轉不契祖云可無方便乎準舉真淨頌曰言有業識在誰云意不深海枯終見底人死不知心祖竦然良久忽聞板聲通身汗下於是脫然準以從上源流并付法偈曰真理直如絃何默更何言我今善付囑表心本無得祖出世祗園遷天台瑞巖國清準於淳祐己酉三月十五示疾集衆遺囑其徒衆請偈準乃執筆書偈曰來時空索索去也赤條條更要問端的天台有石橋倒腹傾腸意轉深了無業識可追尋板聲擊脫汗如雨鑑地輝天耀古今臨濟第十七世杭州淨慈斷橋妙倫禪師台州徐氏子室中嘗舉萬法歸一示徒日隨衆務方山寶侍次師以莧菜根示之寶悟入師付法偈曰本無迷悟人迷悟自家討記得少壯時而今不覺老即繼師席莧根拈出無邊春蠱毒誰能當處親滿目生涯隨分足任從天下樂欣欣臨濟第十八世天台瑞巖方山寶禪師初住西庵無見參師雖有所契未臻其極遂築室華頂精苦自勵一日作務次渙然有省平生凝滯當下冰釋遂走瑞巖呈所解方以偈證曰道人得得出山來盡把襟懷對我開坦坦平平如鏡面澄澄湛湛絶纖埃忽然得箇轉身句衲卷寒雲便歸去萬八千丈華頂峰一笑裂開鐵面具家山到後絶思惟拗折烏藤拄竹扉糞火堆中消息好芋香便是道香時并付法偈曰此心極廣大虛空比不得此道只如是受持休外覓盤居華頂氣雄豪苦勵深藏道愈高徹底呈來親手付轉身句子利吹毛臨濟第十九世天台無見先睹禪師一坐華頂四十餘年足未嘗輒越戶至正賜號妙明真覺白雲度深習禪定後一榮南遊遍叩禪林無有可其意者聞師說法天台欣然就謁師見器之充侍者度問西來密意未審如何師云待娑羅峰點頭即向汝道度以手搖曳擬答師便喝度云娑羅峰頂白浪滔天花開芒種後葉落立秋前師云我家無殘羹剩飯也度云此非殘羹剩飯而何師頷之付法偈曰至大是此心至聖是此法燈燈光不差了此心者達遍叩難逢恰對頭手搖熱喝遽相酬殘羹不中飽人喫瀟灑縱橫得自由臨濟第二十世處州福林白雲智度禪師初住普慈諸剎洪武己酉應召尋隱福林平昔機語不容人録古拙俊侍師室中了明大事深契牧牛之作乃付法偈曰心中有自心法中有至法我今可付囑心法無心法宗師垂手貴天真切齒蝌文篆不仁直下了明端的旨犁牛産出玉麒麟臨濟第二十一世太平府繁昌八峰山古拙俊禪師無際參師問還我照用來際云若有照用即成障礙師云者廝著空佛也救不得際云有無俱寂滅空佛悉皆非後示以偈云憶昔繁昌一別時此心能有幾人知無絃曲子真堪續慧命懸懸付與誰付法偈曰一道不心光三際十方明何於明白中有明有不明驀將照用驗端由高價隨機劈面酬掀翻空佛皆非處月滿青天水滿洲臨濟第二十二世川東普州道林無際悟禪師別號蠶骨蜀中人也年二十出纏縛竹為庵研勵無懈四指大書帖亦不顧只是拍盲做鈍工夫後得大徹大悟即呈本師偈曰寂照無上下光明處處通本來無皂白無處不含容正統九年應召說法上大悅師嘗以無字公案示徒月溪澄久依座下深得奧旨特書月溪二字法語示之并付法偈云我無法可付汝無心可受無付無受心何人不成就才云無字立綱宗金屑依然著眼中驀地虛空連底脫大千沙界一時通臨濟第二十三世南京大岡月溪澄禪師景泰三年敕賜回大岡號慈善一日室中出祖衣示徒乃云此衣是唐朝宮王所置今八百餘年矣祖祖相傳至東普先師普付與老僧若是克家種子方堪紹荷狐假虎威焉敢希冀又云如百丈侍馬祖祖侍南嶽嶽侍曹溪六祖皆久久親炙磨光銼鋭乃能豁徹重關羈鎖掃盡微見窠臼深得大機大用可為人天眼目耳師居嘗凡見僧請益乃云佛法不是鮮魚怕爛卻那即趁出夷峰寧侍傍忽悟入師付衣法偈云心即能知心法即可知法今所付法心非心亦非法遞代金襴希世珍克家堪紹便通津鮮魚一語誰相委致使傍觀笑轉新臨濟第二十四世大岡夷峰寧禪師寶芳住天目往參師器之乃付法偈云祖祖無法付人人本自有汝受無付法急著傳於後大地山河總是真目中無事可相親人人本具傳何物啼鳥山花別有春臨濟第二十五世天目寶芳進禪師示衆云拈花微笑節外生枝面壁安心畫蛇添足山僧者裏無禪可參無道可學直教一箇箇成佛作祖去汝等還信得及麼良久拍膝云劍號巨闕玉出崑岡付野翁曉法偈云真性本無性真法本無法了知無法性何處不通達無禪無道意何窮鐵壁銀山盡打通是處了知無法性金風瑟瑟到梧桐臨濟第二十六世嘉興東塔野翁曉禪師無趣參每呈見解師盡與掃闢昔日所負直使索然一日師謂趣云我有一言要與爾說趣便問師但笑而不語趣又問師又笑趣不諳旨遂禮拜懇求師不得已乃云達磨西來直指人心見性成佛唯在直下體取子若信得及可放下萬緣參箇萬法歸一趣領旨後聞雞鳴有省即剃染師乃付法偈云非法非非法非性非非性非心非非心付汝心法竟闢盡多方絶較量笑中爭信有刀藏雞鳴掣斷黃金鎖直得家聲播大邦臨濟第二十七世嘉興敬畏無趣如空禪師無幻參師誨以教外別傳之旨朝夕參究有所契入遂剃染結庵徑山集無趣語録往見趣趣問子向在甚麼處幻曰徑山趣曰做得甚麼事幻曰某家買得一段田收得原本契書請和尚僉押即將集本呈上趣接得展看曰者箇是我的汝的聻幻曰和尚莫搶奪行市趣便擲下集本幻便出復呈偈趣曰非語言文字也是汝作底麼幻曰某甲鼓粥飯氣若謂有所得辜負和尚不少趣乃點首即付法偈云師傳拈花宗示我微笑法親手展付汝持奉遍塵剎識得祖翁田地了契書僉押更呈看末稍一句無私語父子恩情徹底寒臨濟第二十八世徑山無幻性沖禪師初住車溪後開法徑山示衆云老漢本擬深藏鄉僻遣過生緣爭奈無趣老人有不了底公案山僧出來與他了卻僧問如何是無趣老人不了底公案師便打僧云某甲有甚過師云殃及兒孫南明掩關興善師至關前勘問南將前工夫舉似師跌足云悔我來遲向後總欲到此不易得也南即啓關往謁於車溪徑山服勤八載一日於地上拾片紙有觀方知彼去去者不至方之句有省呈無幻幻乃印可即命充首座付法偈曰得本無所得傳亦無可傳今付無傳法東西共一天塔於徑山扣關勘問覓知音跌足分明示本真八載辛勤緣會熟途中拾得自家珍臨濟第二十九世興善南明慧廣禪師徑山示衆云五峰頭卓朔雙徑尾顛先喝石嵒一任𨁝跳明月池覆地傾天此四句中有一句有殺人刀無活人劍有一句有活人劍無殺人刀有一句殺人刀活人劍俱有有一句殺人刀活人劍俱無伶俐衲僧檢點得倜儻分明許你一生參學事畢普明鴛湖初謁無幻於車溪開示禪要後侍南明於徑山一日閲思益梵天經有省即呈無生偈曰鐵壁銀山誰敢摧賊身驀地拶將來相看元是舊相識當下慚惶笑臉開又曰歷劫多年窮苦事風光流得到今朝笙歌車馬門如市內院依然鎖寂寥南閲之痛加呵斥更不作偈頌南後掩關皋亭諸處不離左右一十三載值南病篤一日舉香嚴獨腳頌問明明才開口南便喝明復擬開口南又喝明方點首南即付法偈云無傳無受法無傳無受心付與無手者掣斷虛空斤死灰淋過屈屈屈末後翻然重漏泄突然一喝雙耳聾纍及兒孫揚醜拙臨濟第三十世建寧普明玄微妙用禪師別號鴛湖初住嘉興白苧普明寺及桐月庵介庵進往參師即垂誨便有師資之契庵因臥疾忽聞匠斧砍大木聲有省即呈萬如和尚萬頷之後聞師住建寧普明及侍萬入山請師升座扣問師云不須更問山中事觀見容顏便得知庵便禮拜未幾辭往曹山再參師於普明即命入室庵方跨門師云是甚麼菴擬答師震威便喝庵豁然契悟即掩耳而出一日師缺安庵侍次師命茶問云汝字覺先喚甚麼作先庵云且喜今日得自在師云如何是覺後菴云請和尚尊重師云你還分得先後麼庵良久師便喝庵云某甲只管喫茶師云如何是喫茶底事庵云柿棗腐乾都在者裏師云你作麼生庵云卻被某甲一口食盡師云滋味如何庵云甜者自甜鹹者自鹹師云未在更道庵云某甲謝茶便禮拜師深喜之又一日師集衆乃舉拂子云世尊拈一枝花老僧舉一枝拂且道是同是別庵出禮三拜歸位師云者瞎驢遂擲下即出從上源流衣拂并書法偈付云沿流一段事竟無頭與尾付與師子兒哮吼滿大地師於崇禎壬午十月十一日說偈而化嗣法三人庵出世嘉興金明寺方跨門來陷虎才當機掩耳起風雷雖然不犯將軍令爭奈洪音遍九垓拈花舉拂太勞翁同別尤看大賚功三拜祖肩歸位立高提祖令振寰中臨濟第三十一世嘉興金明介庵悟進禪師初受請徑山萬壽寺結制及住餘杭廣福武康天池禾之金明諸剎皆應時也牧公道者項謙髫年首謁博山余集生諸老以向上一著苦究念餘年礙膺不釋後於順治庚寅別駕八閩漳州壬辰歲暮瓜代至福州見粵東華首空隱禪師飛錫過閩本分接人之暇亦贊念佛持咒蒙授准提懺像歸送楞嚴重梓流通一日禮懺口宣佛身充滿於法界普現一切群生前之句忽然身心脫落遂述偈曰一手拈磬一手鼓今日捉敗無位祖觸處逢渠本現成恆河沙國佛一母後參天界浪和尚浪曰聞你幼年見博山余集生諸公是否公禮曰今日特特禮拜和尚浪曰除卻搖唇鼓舌豎指揚眉處還我到家語來公叉手默然浪頷之己亥春參金明本師問涅槃心易曉差別智難明如何是差別智師云差別且止喚甚是涅槃心公舉拳師云死了燒了在甚麼處公才開口師震威便喝公從此冰釋又作十二時偈以自娛輒呈師師接過曰者箇是紙墨還別有麼公展手視師師乃休又一日師拈香墜問曰無情如何說法公曰和尚拄杖子𨁝跳去也師復勘問公拈墜擲地叉手而立師拾墜置於几公曰無情說法竟師休去一日師刻蜜蜂頌將竣師曰病朽觀你蜂頌頗恰意但要問你日出扶桑大地紅是何意旨下一轉語可付諸梨棗公云適問箇是什麼師哂之公即呈偈曰聊聞舉著便承當好肉無端已剜瘡著眼機先看端的頂門誰不帶扶桑師印可即書法偈付云維摩之疾好承當痛處何妨炙艾瘡眼正心光扶祖道任教烏兔起滄桑并授拄杖名曰真本頌曰墜香拈起貴知音擲地酬來星斗沉莫謂一機全殺活當場須是芥投針重重伸問幾人知日擁扶桑示孰齊自古迄今輝宇宙夜深舞袖入岑西偈頌十二時偈平旦寅翻來覆去顯無生遍歷山河無覓處那知只在剎那頃日出卯不涉思惟豈弄巧驀然築破者娘生恆河沙劫一時了食時辰拈盂舉箸是何人日用尋常承此力不移寸步現全身禺中巳了然一念渾無事饑餐渴飲睡來眠妙用頭頭靡不是日中午無影樹下一片土一鋤翻轉作園林閒時一笑空今古日昳未本來一物無頭尾雖然不履亦不衫日夕足跟原點地晡時申祖道從來付國臣橫身擔荷恁麼去隨處安閒絶比鄰日入酉此事如同池底藕青蓮透出自淤泥涅而不淄渠不朽黃昏戌大道現成何得失拶破而門休歇渠何云天地同根實人定亥洞明此道誰隔礙上拄地兮下拄天也是貧兒思舊債半夜子生來四十有二齒自此親見道人來左之右之難掩耳雞鳴丑癡狂見影兩頭走須知別有好風光穿破布衫露出肘金明老人移梅掘深土得斷碑半截額有宋天封佛慈禪師蜜蜂頌五首賡和原韻花林一望發真機幾箇英揚得採歸昔日隨緣又隨隊今朝同路不同飛陸有山兮水有涯幾曾歷盡拾歸衙揚眉努目承渠力百草頭邊顯作家逼塞虛空薰透時層層脫落盡掀離些些家計和盤出卻興時人甜入脾君看投窗昧已光鑽研未透卻忙忙驀然一轉翻身去遍地清涼直下當八面玲瓏絶比桐一絲不掛更神通回頭識得針鋒處日出扶桑大地紅己亥仲冬贈素穎法兄八閩候師翁扶雲杖浙東錫飛千里外行止妙高峰手忝同參列時窮道不窮堪嗟人世醉期振啓寰中子先羅道兄見過并賜佳什和答二首天地為吾廬白雲自落落時坐對青松身心付寥廓其二惠然破蒼苔過贈珠璣語無物可相呈喫盞清茶去拄杖脫皮露骨播揚家醜驗盡龍蛇過人之首癭瓢雲水途中隨處受用冷暖自知為人所重𨍏轢嚴道翁有瞿曇自畫張婆帳上像讚傍有蘭花二本一日托壻談鄴侯持一箋索和賦此塞責一種幽蘭徹九垓婆心切處即如來紫羅帳裏真消息觸著當人眼豁開庚子自題行樂趺坐堂堂露碧晴手拈如意絶相呈鼻頭端的誰能覷折腳鐺邊覓俊英昔日毗耶曾杜口今朝檇李更生獰或問幾經遊化國齊梁吳楚閩燕京咦山是山兮水是水何嘗移易一星星衲頭捲起渾然無縫披時八面生光寒暑受用不盡知恩方可承當竹篦觸則黃金失色背則無處潛藏煆煉凡聖爐韝全憑者箇舉揚入園即事草履相攜入故園行行止止钁頭邊爛泥有刺無人見踏著方知腳底穿白拂擲去收來自有由當機不薦若為憂可憐逐塊承言者掛向禪床空白頭掃地古佛堂前精潔好是塵非塵一時掃拈放總由掌握中清風明月光皎皎庚子孟冬望前一日金明老人將無趣祖法嗣駱懶翁饑來喫飯困來眠偈出閲喜而和之饑來喫飯困來眠少攜席帽漫遊燕自從識得曹源路陸不乘騾水不船饑來喫飯困來眠空手把鋤耕劫田一派清溪車轆轆石橋不斷水潺潺饑來喫飯困來眠癡不癡兮顛不顛無限煙雲風捲盡一輪杲日照南泉饑來喫飯困來眠日炙風吹不計年獨坐堂堂人不曉從今懶舉向人前饑來喫飯困來眠鼻直眉橫囉哩連解得轉身些子意珠簾高捲月明前饑來喫飯困來眠課子澆花絶世羶寒則普寒熱普熱不須搔首問青天饑來喫飯困來眠才問當胸劈一拳直下若能親薦得屠兒立地證金仙饑來喫飯困來眠那管東西南北天男兒但得心空第觸處何曾不現前和普明禪師牧牛圖頌未牧青山緑水恣咆哮四顧三回路轉遙只管貪程為太速何知日用犯佳苗初調才見牛兮驀鼻穿粗浮習氣急加鞭那時倔強橫馳走把定繩頭好一牽受制四蹄今已息奔馳放去收來無不隨且喜鞭繩猶把握牧童何肯自為疲回首溪山踏遍自回頭熟處生時性漸柔鼻貫一條成底事不勞腕力暫相留馴伏左盤右轉碧溪邊撇下鞭繩樂自然幾度緑楊歸夜月山童高臥竟忘牽無礙掉尾擎頭適自如縱橫脫略有何拘悠然一曲寒崖上短笛吹開物外餘任運饑餐渴飲絶邊中倦即和雲臥草茸驟步任教青嶂外滿腔風月興偏濃相忘人牛共住此山中動轉施為絶異同我本是渠渠即我不知南北與西東獨照牛無方所牧童閒懶把虛名落世間盡大地來無我我不消彈指透重關雙泯人牛兩盡沒形蹤今古相酬劫亦空本地風光一段事歲寒松柏翠叢叢甲辰春仲望後一日至折蘆菴晤牧雲和尚適有曹村持菴金年翁念佛偈見惠索和聊爾率責不計工拙也彌陀無受亦無傳箇箇眉毛蓋眼前腳下道途真太近返將掘地別求天彼既丈夫我亦然彌陀誰不是同參遇緣赴感周沙界起止何曾有數千佛無先後達為前貴在躬行不在宣一念翻身皆淨土水銀墮地粒孤圓書問復丁司理書頃讀手札內云不覺呵呵大笑要知大笑是甚麼又云胸中平曠無物又是甚麼無物者即物也百尺竿頭仍須更進一步古德云莫守寒巖異草青坐著白雲宗不妙是故吾輩於日用尋常中時看貪瞋癡從何起滅貪則不止瞋則不反癡則不覺是以無窮之苦亙劫淪墮皆三者所致然此三者不踰乎瞥然一念果能念起即覺覺之不息雖至愚之人可以轉三毒為三德猶己指之屈信耳況智如老年翁者乎智無二體用之克己則謂覺用之利私則謂智且覺之為言如大夢忽醒智之為言如夢中之盤算也故覺之與智少異耳是知年翁歷歲持誦金剛經實無得力處沒奈何只得向公郎饒舌當如佛昔為歌利王割截身體節節支解佛於爾時實無四相若有四相應生瞋恨是故菩薩應離一切相如來是真語實語如語不誑語不異語者猶此推之年翁還有辱否瞋否病否應作如是觀附丁士選來書前小兒歸具述尊教云看了此字大笑起來得道之人事過即無怎麼如今還有在弟聞之不覺呵呵大笑覺胸中平曠無物始信有道之言能提人於污泥之中也先此致謝復仲翁祝表兄書別後承惠手録諸書高誼如雲迄今銘感正想念間捧讀手教知起居迪吉欣慰遠懷并聞鹽臺世誼聚晤有期真天假之緣也又荷表兄垂念客歲小星兩愛繼亡之變遠蒙勸慰弟初時未始不動哀但哀而不傷也譬如明鏡當臺胡來胡現漢來漢現妍醜交臨本光常淨事過即無本無朕跡猶如月印千江波波悉見而月不殊如春行萬國在在同敷而春無跡蓋其靈應無窮不可得而名狀所可喻而言者喜怒哀樂春容月影耳而況娑婆缺陷世界缺則卒難如意何往而非苦陷則卒難出離何往而非纍故吾人於缺陷之窟日用常行之中步步勘驗親證身非我有心逐境生自然死生不排而空愛憎不遣而化所謂缺陷之窟頓成極樂之邦然達而不勇則身心二執未能徹體解脫是以必先洞明自心貴在情死蓋情不死性不活則於博地凡夫欲其直下轉識成智心徑圓通無有是處故善造道者能於死生愛憎境緣逆順難克之際本光迸露之頃著眼覷破不被現行所轉始之謂大丈夫積劫無明一旦當下冰消猶兵不血刃天下太平矣高明如我表兄以為何如餘則披晤時再請教不盡雜著跋夢堂法兄大師南溪小禪山八景夢堂大師擔荷斷橋正宗開法南溪諸剎鼓破沙盆震驚宇宙若塗毒鼓靡不喪身失命及讀小禪山詩如青天白雲開遮自在麗空杲日爍破大千正所謂咳唾掉臂盡是祖師西來意豈虛語哉良以自得之妙暗合孫吳然玄酒大羹固非常流所能知味使見誦警凜之何特八景發揮政如十字街頭拋碌磚磕著當自知耳諸經日誦序是經從譯梵以來彙約群籍蚤暮受持緇素宗尚而此經一一悉從我迦文如來胸中流出得聞其一句一偈皆流歸八識田中機感合薰不可思議課持之功大矣哉然信解受持者應不取於相無所住而生其心離其心而課誦是名衆生即其心而課誦則非衆生衆生而能課誦是為最上第一希有功德可淺視者乎顯如禪師深明佛旨精護毗尼以普賢之行濟度群有復能空諸所儲廣梓教典茲又刻此諸經日誦請序於余余曰凡斯有情皆具佛性惟心影現不離真如舍己外求不啻背父而逃夫般若華言智慧也當知智慧與愚癡俱無定體悟此心即愚而智迷此心即智而愚故已開悟者雖嘻笑怒罵皆智慧也未開悟者縱日事琅函亦愚癡也首楞嚴云若能轉物即同如來達斯旨者向未展此卷已前課誦竟矣重建明心庵勸緣疏佛之慈光靡所不燭紺容宮殿無方不顯小大有殊應機不二然其福群黎啓昏瞶則如隨色之摩尼無往而不利也甲辰春仲遠近檀護布金得郡南象賢鄉敗屋數椽額曰明心恭請佛音菴主住持焚修闡揚宗乘但越歷寒暄風霜蟲剝摧頽尤甚若不整修仍同樹下敢告賢豪檀信見善樂助陳紅朽貫堪培歷世之良因間碧塗金必獲多生之勝報一飯能致天福七錢尚感輪王且菴主髫年因念生死事大棄恩愛志披緇勤求聖道一衲翛然自圓具以來秋霜烈日薰修不倦則其為四衆所敬羡也余更敬其識卓見殊聊綴數語以勸云太乙天尊濟度血湖拔罪寶懺序苦趣茫茫淪墮劫海方從欲生旋從欲死無欲無生無生無死惟超然三界者能之夫衆生業果種子現行積劫所薰一旦盡淨掃除不甚難乎或曰無浸熾也或曰寧遏制也然冬凋之木至春復檗幾幾不滋蔓乎是以大聖慈悲立廣大方便法門許人懺悔蓋懺其將來悔其既往尤必仗無上至真顯演潛通為之救度而實由我心自為救度華嚴論云如將寶器直授凡庸如夜夢千秋覺即隨滅道原於心心外無道福由禍轉受福還空自無上至真以至種種地獄惟心所現如鷹化為鳩昔心頓盡橘變成枳前味永消故知有情無情各無定性但隨心變豈逐業生是轉惡為善之機從凡入聖之路慨自欲海沉淪衆生莫覺血湖之罪女子尤深所以女年七十等諸男子一年而況五漏其軀生前良苦死後堪知是故懺悔尤急獨可嘆者生具鬚眉軒然男子聖賢可親經藏可參師友可範乃竟悠忽歲華纏綿情欲倏焉委命泉路昏昏較之女人更當何如且人身八萬四千毛孔一孔一血一血一湖故即身是血即血是湖一血不淨一湖未渡慈航莫濟何處回頭此顯如師血湖懺意也雖然欲其出死莫若無生欲知無生莫若悟道執情破而真性顯習氣盡而大道成執則處處瘡疣通則頭頭妙藥是非上根利智一聞千悟頓超塵劫之功安能獲出血湖苦海者哉為此因緣不覺漏逗重建文昌閣募疏我禾文昌閣不一惟南關梓潼匯獨著以其水旱疾疫之災禱之輒除毫忽弗爽此非特地之靈實有以陰主之也且層樓翬飛岌立於鶴渚林巒紫翠中若畫圖然憑闌四顧將脫塵氣而與造物者游亦大觀也此乃先曾伯祖少溪公捨基創建以啓後人之洗心崇奉者嗣後三世五登一郡衣冠之盛肇跡於文昌食報亦不淺矣自兵燹之餘一旦蕩然有識者過而傷之今有圓悟上人勵志復興索余述其緣起用告十方善信伏祈見聞歡喜咸樂為助其子若孫自邀文昌默佑鑄頑成仁陶癡為慧未始不若前人之功名事業而永賴旗常呵護也況因果既驗於前必徵於後更何待余饒舌為哉是為序梓童帝君本願經序分教為三非也合教為一亦非也既一矣復何所合以為一而必合之以為合而必一之著相甚矣且人生世間僅有善惡兩途念之正者為善念之不正者為惡行乎正而自見為善與為惡同是故仁人君子日乾夕惕孜孜矻矻垂老而不敢休止者豈求福報耶完吾之所為人而已儒釋道之論詳矣而世未能盡式於教者少為之勸耳夫吾不能自勸而又不能為人之勸虛浪一生造業啓殃究之老死墮落而莫可救藥實堪憐憫此顯如上人以梓潼帝君本願真經刊布流傳廣勸一切有情咸臻道化者也顯如一釋門衲子乃作是念而儒道家竟茫然不為悔省視顯如宛轉婆心可不慚愧汗下乎余則曰不然儒釋道無分也無合也并無善也無惡也刊布真經者我之法施也而非吾之法施誦持真經者人之功德也而非人之功德也何也法施無相功德無相經不云乎一切法應如是知如是見如是信解不生法相題建州浦城華藏菴募毗盧佛像聞夫梵鐘罔叩則聲響不流蓮炬未燃則寶光韜耀故像季起敬藉有聖容是猶托一鐘以曉千夢析一燈以破昏衢也蓋由勝相而識諸祖由諸祖而辦道場由道場而知天地由天地而測虛空由虛空以悟自心自佛可謂尋流而獲源矣矧庸心鄙劣未充觸途成觀若非散影分身曷以薰移其習密化其機故我素穎法兄大和尚了十法界於一心得四無礙以崇善欲就閩浦成地居天大願牧道者聞而嘉之遂述此以告衆緣凡我同仁善信覺路鋪金莊嚴妙相庶幾緣而顯理緣而顯事事理雙彰事事無礙焉所謂華藏界中無量功德者詎不在是耶
